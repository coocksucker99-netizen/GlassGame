<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GlassGame | Page Down</title>
    <style>
        :root {
            --bg: #0b0b10;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #6366f1;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background: #06060b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* Animierter Hintergrund mit mehreren Ebenen */
        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Ebene 1: Langsame wandernde Farbverläufe */
        .bg-gradient-1 {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 25% 25%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 70%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 35% 65%, rgba(99, 102, 241, 0.1) 0%, transparent 40%);
            animation: gradientShift 12s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(2%, -1%) rotate(1deg);
            }
            50% {
                transform: translate(-1%, 2%) rotate(-1deg);
            }
            75% {
                transform: translate(-2%, -1%) rotate(0.5deg);
            }
        }

        /* Ebene 2: Mittlere Glanzpunkte */
        .bg-gradient-2 {
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background:
                radial-gradient(circle at 20% 40%, rgba(168, 85, 247, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 80% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 30%),
                radial-gradient(circle at 10% 75%, rgba(59, 130, 246, 0.07) 0%, transparent 35%);
            animation: gradientShift2 10s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes gradientShift2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-1%, 1%) scale(1.02);
            }
            66% {
                transform: translate(1%, -1%) scale(0.98);
            }
        }

        /* Ebene 3: Glanz-Linien */
        .gloss-line-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(99, 102, 241, 0.2) 15%,
                    rgba(139, 92, 246, 0.5) 35%,
                    rgba(168, 85, 247, 0.7) 50%,
                    rgba(139, 92, 246, 0.5) 65%,
                    rgba(99, 102, 241, 0.2) 85%,
                    transparent 100%);
            z-index: 101;
            pointer-events: none;
            animation: glossLineMove 5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3), 0 0 40px rgba(139, 92, 246, 0.1);
        }

        @keyframes glossLineMove {
            0%,
            100% {
                opacity: 0.5;
                filter: blur(0px);
            }
            50% {
                opacity: 1;
                filter: blur(1px);
            }
        }

        /* Ebene 4: Schwebende Partikel */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.5), 0 0 20px rgba(139, 92, 246, 0.2);
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(40px) scale(0.3);
                opacity: 0;
            }
        }

        /* Werbebanner */
        .ad-banner-top {
            position: fixed;
            top: 2px;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(99, 102, 241, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.12);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .ad-banner-top span {
            color: #a5b4fc;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-shadow: 0 0 20px rgba(165, 180, 252, 0.3);
        }

        .ad-banner-top a {
            color: #c7d2fe;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 8px 20px;
            border-radius: 9999px;
            transition: all 0.3s;
            letter-spacing: 0.03em;
            pointer-events: auto;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .ad-banner-top a::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent 40%,
                    rgba(255, 255, 255, 0.1) 50%,
                    transparent 60%);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .ad-banner-top a:hover {
            background: rgba(99, 102, 241, 0.35);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4), inset 0 0 20px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        .ad-banner-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(99, 102, 241, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(99, 102, 241, 0.1);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .ad-banner-bottom .ad-tag {
            color: #818cf8;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(129, 140, 248, 0.3);
        }

        .ad-banner-bottom .ad-text {
            color: #94a3b8;
            font-size: 0.8rem;
            letter-spacing: 0.02em;
        }

        .ad-banner-bottom a {
            color: #c7d2fe;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.25);
            padding: 7px 18px;
            border-radius: 9999px;
            transition: all 0.3s;
            pointer-events: auto;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .ad-banner-bottom a::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent 40%,
                    rgba(255, 255, 255, 0.08) 50%,
                    transparent 60%);
            animation: btnShine 3s ease-in-out infinite;
        }

        .ad-banner-bottom a:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.45);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.3), inset 0 0 15px rgba(99, 102, 241, 0.08);
            transform: translateY(-1px);
        }

        .ad-sparkle {
            display: inline-block;
            animation: sparkle 1.8s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(165, 180, 252, 0.6));
        }

        @keyframes sparkle {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 64px 48px;
            text-align: center;
            max-width: 520px;
            width: 100%;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 80px rgba(99, 102, 241, 0.08);
            position: relative;
            z-index: 1;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            margin-top: 60px;
            margin-bottom: 60px;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%,
                    rgba(99, 102, 241, 0.06) 0%,
                    transparent 50%);
            pointer-events: none;
            animation: cardGlow 6s ease-in-out infinite;
        }

        @keyframes cardGlow {
            0%,
            100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(2%, -2%);
            }
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.1) 20%,
                    rgba(255, 255, 255, 0.2) 50%,
                    rgba(255, 255, 255, 0.1) 80%,
                    transparent 100%);
            pointer-events: none;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 40px;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            position: relative;
            z-index: 1;
        }

        .brand-dot {
            width: 5px;
            height: 5px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow:
                0 0 6px #ef4444,
                0 0 12px rgba(239, 68, 68, 0.6),
                0 0 24px rgba(239, 68, 68, 0.3);
            animation: breathe 2.6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
                box-shadow: 0 0 4px #ef4444, 0 0 8px rgba(239, 68, 68, 0.4), 0 0 16px rgba(239, 68, 68, 0.2);
            }
            50% {
                transform: scale(1.5);
                opacity: 1;
                box-shadow: 0 0 8px #ef4444, 0 0 16px rgba(239, 68, 68, 0.7), 0 0 30px rgba(239, 68, 68, 0.5);
            }
        }

        .download-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 32px;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            z-index: 1;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 20px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
            cursor: not-allowed;
            opacity: 0.5;
            transition: all 0.3s;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            position: relative;
            text-decoration: none;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent 35%,
                    rgba(255, 255, 255, 0.05) 50%,
                    transparent 65%);
            animation: btnShine 3.5s ease-in-out infinite;
        }

        .download-btn .icon {
            font-size: 1.4rem;
            opacity: 0.7;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.2));
        }

        .cursor-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            background: rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #c7d2fe;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            padding: 10px 18px;
            border-radius: 9999px;
            white-space: nowrap;
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(99, 102, 241, 0.2);
            opacity: 0;
            transition: opacity 0.15s ease;
            transform: translate(16px, 16px);
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .cursor-tooltip.visible {
            opacity: 1;
        }

        .page-down-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .page-down {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #f87171;
            background: rgba(248, 113, 113, 0.06);
            border: 1px solid rgba(248, 113, 113, 0.2);
            padding: 10px 24px;
            border-radius: 9999px;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            text-shadow: 0 0 20px rgba(248, 113, 113, 0.3);
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.1);
        }

        .updating-text {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.03em;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 1px;
        }

        .updating-dot {
            display: inline-block;
            color: #818cf8;
            font-weight: 700;
            animation: dotPulse 1.5s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(129, 140, 248, 0.4);
        }

        .updating-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .updating-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {
            0%,
            100% {
                opacity: 0.15;
                transform: translateY(0);
            }
            25% {
                opacity: 1;
                transform: translateY(-3px);
            }
            50% {
                opacity: 0.15;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    
    
    <video id="bg-video" autoplay muted loop playsinline>
    <source src="assets/bg.mp4" type="video/mp4">
</video>

<audio id="bg-music" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>

    <!-- Hintergrund-Ebenen -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>
    <div class="gloss-line-top"></div>

    <!-- Partikel-Container -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Werbebanner -->
    <div class="ad-banner-top">
        <span class="ad-sparkle">✦</span>
        <span>Suchst du nach Roblox Scripts?</span>
        <a href="https://vexyrondev.github.io/Vexyron.com/" target="_blank" rel="noopener noreferrer">Hier findest du sie</a>
        <span class="ad-sparkle">✦</span>
    </div>

    <div class="ad-banner-bottom">
        <span class="ad-tag">Werbung</span>
        <span class="ad-text">Roblox Scripts & mehr auf</span>
        <a href="https://vexyrondev.github.io/Vexyron.com/" target="_blank" rel="noopener noreferrer">Vexyron</a>
        <span class="ad-text">— Jetzt entdecken</span>
    </div>

    <div class="cursor-tooltip" id="cursorTooltip">Incoming Soon</div>

    <div class="card">
        <div class="brand">
            <span class="brand-dot"></span> GlassGame
        </div>

        <div class="download-wrapper">
            <button class="download-btn" id="downloadBtn" disabled>
                <span class="icon">↓</span>
                Download
                <span class="icon">↓</span>
            </button>
        </div>

        <div class="page-down-wrapper">
            <div class="page-down">
                Page Down
            </div>
            <div class="updating-text">
                Updating<span class="updating-dot">.</span><span class="updating-dot">.</span><span class="updating-dot">.</span>
            </div>
        </div>
    </div>

    <script>
        // Partikel erstellen
        const particlesContainer = document.getElementById('particlesContainer');
        const particleCount = 30;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 4 + 2;
            const left = Math.random() * 100;
            const delay = Math.random() * 12;
            const duration = Math.random() * 10 + 8;
            const opacity = Math.random() * 0.4 + 0.2;

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = left + '%';
            particle.style.bottom = '-20px';
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = delay + 's';
            particle.style.opacity = opacity;
            particle.style.background = `rgba(${139 + Math.random() * 40}, ${92 + Math.random() * 30}, ${246 + Math.random() * 9}, ${opacity})`;
            particle.style.boxShadow = `0 0 ${size * 3}px rgba(139, 92, 246, ${opacity})`;

            particlesContainer.appendChild(particle);
        }

        // Tooltip Logik
        const downloadBtn = document.getElementById('downloadBtn');
        const cursorTooltip = document.getElementById('cursorTooltip');

        downloadBtn.addEventListener('mouseenter', () => {
            cursorTooltip.classList.add('visible');
        });

        downloadBtn.addEventListener('mouseleave', () => {
            cursorTooltip.classList.remove('visible');
        });

        document.addEventListener('mousemove', (e) => {
            if (cursorTooltip.classList.contains('visible')) {
                cursorTooltip.style.left = e.clientX + 'px';
                cursorTooltip.style.top = e.clientY + 'px';
            }
        });

        // === KOPIERSCHUTZ ===
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'x' || e.key === 'v')) {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'i') {
                e.preventDefault();
                return false;
            }
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'j') {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('dragstart', (e) => {
            e.preventDefault();
            return false;
        });

        document.addEventListener('selectstart', (e) => {
            e.preventDefault();
            return false;
        });

        document.addEventListener('copy', (e) => {
            e.preventDefault();
            return false;
        });

        document.addEventListener('cut', (e) => {
            e.preventDefault();
            return false;
        });
    </script>
</body>
</html>
